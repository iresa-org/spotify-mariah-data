# This is a basic workflow to help you get started with Actions

name: Calculate daily

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches:
      - data
    paths:
      - upload/**

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  run-daily:
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.head_ref }}
        # Value already defaults to true, but `persist-credentials` is required to push new commits to the repository.
        persist-credentials: true

    - name: Use Node.js 24.16
      uses: actions/setup-node@v6
      with:
        node-version: 24.16

    - name: Install
      run: npm install

    - name: Run daily
      run: node scripts/daily.ts
    
    - name: Check records
      run: node scripts/record.ts
  
    - name: Calculate YTD
      run: node scripts/ytd.ts
    
    - name: Calculate Monthly
      run: node scripts/monthly.ts

    - name: Update historical
      run: node scripts/historical.ts

    # Commit all changed files back to the repository
    - uses: stefanzweifel/git-auto-commit-action@v7

        

