<lib-master-detail [selectedItem]="isMobile() ? null : selectedAlbum()" (closeClicked)="closeClicked()">
    <lib-master-content>
        <lib-album-list (albumSelected)="onAlbumSelected($event)"></lib-album-list>
    </lib-master-content>

    <lib-detail-content>
        <lib-album-track-list [selectedAlbum]="selectedAlbum()"></lib-album-track-list>
    </lib-detail-content>
</lib-master-detail>
