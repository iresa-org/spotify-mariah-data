<section class="albums-page" aria-label="Albums">

  <header class="page-header">
    <div>
      <p class="page-header__eyebrow">Spotify Streams</p>
      <h2 class="page-header__title">Albums</h2>
    </div>
  </header>

  @if (chartData().length > 0) {
    <section class="panel" aria-label="Albums daily streams chart">
      <div class="panel__heading">
        <h3>Top Albums by Daily Streams</h3>
        <p>Albums with the most streams today</p>
      </div>
      <div class="chart-wrap" role="img" aria-label="Bar chart of top albums by daily streams">
        <ngx-charts-bar-vertical
          [results]="chartData()"
          [scheme]="colorScheme"
          [xAxis]="true"
          [yAxis]="true"
          [showDataLabel]="true"
          [yAxisTickFormatting]="yAxisTickFormat"
          [dataLabelFormatting]="yAxisTickFormat"
          [roundEdges]="true"
        />
      </div>
    </section>
  }

  <lib-album-ranking></lib-album-ranking>
</section>
