@if (loaded()) {
<div class="dashboard">
  <aside class="dashboard__sidebar" aria-label="Dashboard navigation">
    <div class="brand">
      <div class="brand__badge" aria-hidden="true">MC</div>
      <div>
        <p class="brand__eyebrow">Artist Overview</p>
        <h1 class="brand__title">Mariah Carey</h1>
      </div>
    </div>

    <nav class="nav" aria-label="Main navigation">
      <a class="nav__link" routerLink="overview" routerLinkActive="nav__link--active">Overview</a>
      <a class="nav__link" routerLink="tracks" routerLinkActive="nav__link--active">Tracks</a>
      <a class="nav__link" routerLink="albums" routerLinkActive="nav__link--active">Albums</a>
    </nav>

    @if (lastUpdated()) {
      <dl class="sidebar-stats">
        <div>
          <dt>Last Updated</dt>
          <dd>{{ lastUpdated() }}</dd>
        </div>
      </dl>
    }
  </aside>

  <main class="dashboard__content">
    <router-outlet />
  </main>
</div>
} @else {
  <div class="loading" aria-live="polite" aria-busy="true">
    <span class="loading__spinner" aria-hidden="true"></span>
    <p>Loading Mariah Carey data&hellip;</p>
  </div>
}
