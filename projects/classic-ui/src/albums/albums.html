<table class="table-striped">
    <thead>
        <tr>
            <th style="width:64px">#</th>
            <th>Name</th>
            <th style="width:200px">Play Count</th>
            <th style="width:150px">Change</th>
            <th style="width:150px">%</th>
        </tr>
    </thead>
    <tbody>
        @for (item of albums; track $index) {
        <tr class="item">
            <td data-title="#">{{$index + 1}}</td>
            <td data-title="Name">{{item.name}}</td>
            <td data-title="Play Count">{{item.playcount | number}}</td>
            <td data-title="Change">{{item.change | number}}</td>
            <td data-title="%">{{item.percent | percentWithSign: '1.0-2'}}</td>
        </tr>
        }
    </tbody>
</table>
