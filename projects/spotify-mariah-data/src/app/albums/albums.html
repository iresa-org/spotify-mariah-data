<table class="table-striped">
    <thead>
        <tr>
            <th style="width:64px">#</th>
            <th>Name</th>
            <th>Play Count</th>
            <th>Change</th>
            <th>%</th>
        </tr>
    </thead>
    <tbody>
        @for (item of albums; track $index) {
        <tr class="item">
            <td data-title="#">{{$index + 1}}</td>
            <td data-title="Name">{{item.name}}</td>
            <td data-title="Play Count" style="width:200px">{{item.playcount | number}}</td>
            <td data-title="Change" style="width:150px">{{item.change | number}}</td>
            <td data-title="%" style="width:150px">{{item.percent | percent}}</td>
        </tr>
        }
    </tbody>
</table>
